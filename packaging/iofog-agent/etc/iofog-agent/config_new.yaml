#
# IOFog Agent Configuration
# This file contains all configuration profiles in a single YAML file

currentProfile: default  # default | development | production

profiles:
  default:
    privateKey: ""
    routerHost: ""
    routerPort: ""
    routerUuid: ""
    controllerUrl: "http://localhost:54421/api/v3/"
    iofogUuid: ""
    secureMode: "off"
    devMode: "off"
    controllerCert: "/etc/iofog-agent/cert.crt"
    arch: "auto"
    networkInterface: "dynamic"
    dockerUrl: "unix:///var/run/docker.sock"
    diskConsumptionLimit: "10"
    diskDirectory: "/var/lib/iofog-agent/"
    memoryConsumptionLimit: "4096"
    processorConsumptionLimit: "80.0"
    logDiskConsumptionLimit: "10.0"
    logDiskDirectory: "/var/log/iofog-agent/"
    logFileCount: "10"
    logLevel: "INFO"
    statusUpdateFreq: "30"
    getChangesFreq: "60"
    postDiagnosticsFreq: "10"
    scanDevicesFreq: "60"
    gps: "auto"
    gpsCoordinates: "0,0"
    gpsDevice: ""
    gpsScanFreq: "60"
    isolatedDockerContainer: "off"
    edgeGuardFreq: "0"
    dockerPruningFreq: "0"
    availableDiskThreshold: "20"
    upgradeScanFrequency: "24"
    timeZone: ""
    namespace: "default"
    caCert: ""
    tlsCert: ""
    tlsKey: ""
    hwSignature: ""

